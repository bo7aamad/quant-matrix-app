name: Build Standalone Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Setup Data Science Compilation Dependencies
      run: |
        sudo apt-get update
        # Injected autopoint, patchelf, and gfortran so pandas/numpy can compile
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev openjdk-17-jdk unzip zip python3-dev cmake autopoint patchelf gfortran

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Framework
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer

    - name: Build Android Native Binaries via Buildozer
      run: |
        export APP_ANDROID_ARCHS="arm64-v8a"
        yes | buildozer android debug
      continue-on-error: false

    - name: Upload Standalone App Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Quant-Package
        path: bin/*.apk
