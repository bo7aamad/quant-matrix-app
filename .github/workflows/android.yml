name: Build Standalone Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Setup System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache lbzip2 libffi-dev libssl-dev autoconf automake libtool pkg-config cmake git envsubst openjdk-17-jdk unzip zip

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Framework
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer

    - name: Build Android Native Binaries via Cloud Action
      run: |
        export APP_ANDROID_ARCHS="arm64-v8a"
        # The ultimate cloud bypass: Auto-accepts all SDK/NDK licensing conditions
        yes | buildozer android debug
      continue-on-error: false

    - name: Upload Standalone App Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Quant-Package
        path: bin/*.apk
