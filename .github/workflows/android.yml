name: Build Standalone Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    # New Step: Force-inject and lock the environment to Java 17
    - name: Set up JDK 17 Baseline
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup System Compilation Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev unzip zip python3-dev cmake autopoint patchelf gfortran

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Framework
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer

    - name: Build Android Native Binaries via Buildozer
      run: |
        # Clear runner NDK variables to prevent environment leaks
        unset ANDROID_NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_ROOT
        unset ANDROID_NDK_LATEST_HOME
        
        buildozer android debug
      continue-on-error: false

    - name: Upload Standalone App Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Quant-Package
        path: bin/*.apk
